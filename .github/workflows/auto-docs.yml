name: Auto Docs

on:
  push:
    branches: [main]
    paths-ignore:
      - "EXPLAIN.md"
      - "CHANGELOG.md"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate EXPLAIN and CHANGELOG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/update_project_docs.py --heatmap-window weekly

      - name: Detect docs changes
        id: changes
        run: |
          if git diff --quiet -- EXPLAIN.md CHANGELOG.md; then
            echo "No docs changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Report docs drift
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "::warning::Docs drift detected in EXPLAIN.md / CHANGELOG.md. Regenerate locally with: python scripts/update_project_docs.py --heatmap-window weekly and commit the changes."
