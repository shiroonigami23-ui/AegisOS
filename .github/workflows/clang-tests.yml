name: Clang Matrix

on:
  push:
    branches: [main]
    paths-ignore:
      - "EXPLAIN.md"
      - "CHANGELOG.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "EXPLAIN.md"
      - "CHANGELOG.md"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  clang-build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        c_standard: ["c11", "c17"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Check onboarding/CI equivalence
        run: python3 scripts/check_onboarding_ci_equivalence.py

      - name: Build and run clang suite
        run: python3 scripts/run_clang_suite.py --std ${{ matrix.c_standard }}

  clang-sanitizers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Build and run sanitizer suite with suppression baseline
        run: python3 scripts/run_sanitizer_suite.py

  trace-json-property-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Run trace JSON property smoke profile
        run: python3 scripts/profile_trace_json_property.py --smoke --summary-json trace-json-profile-summary.json

      - name: Show summary
        run: cat trace-json-profile-summary.json
