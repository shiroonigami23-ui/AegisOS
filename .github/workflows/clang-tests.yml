name: Clang Matrix

on:
  push:
    branches: [main]
    paths-ignore:
      - "EXPLAIN.md"
      - "CHANGELOG.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "EXPLAIN.md"
      - "CHANGELOG.md"

jobs:
  clang-build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        c_standard: ["c11", "c17"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Check onboarding/CI equivalence
        run: python3 scripts/check_onboarding_ci_equivalence.py

      - name: Build and run clang suite
        run: python3 scripts/run_clang_suite.py --std ${{ matrix.c_standard }}

  clang-sanitizers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Build and run capability tests with ASAN+UBSAN
        run: |
          clang -std=c11 -Wall -Wextra -Wpedantic -fsanitize=address,undefined -fno-omit-frame-pointer \
            -Iuserland/include userland/security/capability.c tests/capability_test.c -o out_capability_san
          ./out_capability_san

      - name: Build and run sandbox engine tests with ASAN+UBSAN
        run: |
          clang -std=c11 -Wall -Wextra -Wpedantic -fsanitize=address,undefined -fno-omit-frame-pointer \
            -Iuserland/include \
            userland/security/capability.c \
            userland/security/sandbox_policy.c \
            userland/security/sandbox_engine.c \
            tests/sandbox_engine_test.c -o out_sandbox_engine_san
          ./out_sandbox_engine_san
