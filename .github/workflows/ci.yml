name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "EXPLAIN.md"
      - "CHANGELOG.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "EXPLAIN.md"
      - "CHANGELOG.md"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-kernel-sim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B out -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build out --config Release --parallel

      - name: Test
        run: ctest --test-dir out --output-on-failure

      - name: Validate Snapshot Schema Ledger
        run: python scripts/validate_snapshot_schema_ledger.py
