name: Project Automation

on:
  issues:
    types: [opened, reopened, closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  issues: read
  repository-projects: write
  contents: read

jobs:
  sync-project:
    runs-on: ubuntu-latest
    steps:
      - name: Sync issue status with project board
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN || github.token }}
          script: |
            const projectId = "PVT_kwHODeXhYc4BTwUL";
            const statusFieldId = "PVTSSF_lAHODeXhYc4BTwULzhA9E1s";
            const todoOptionId = "f75ad846";
            const doneOptionId = "98236657";
            const issueNodeId = context.payload.issue.node_id;
            const action = context.payload.action;

            const query = `
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue { id }
                        }
                      }
                    }
                  }
                }
              }
            `;
            const data = await github.graphql(query, { projectId });
            const nodes = data.node.items.nodes || [];
            let item = nodes.find(n => n.content && n.content.id === issueNodeId);

            if (!item && action !== "closed") {
              const addMutation = `
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                    item { id }
                  }
                }
              `;
              const addRes = await github.graphql(addMutation, { projectId, contentId: issueNodeId });
              item = { id: addRes.addProjectV2ItemById.item.id };
            }

            if (!item) {
              core.info("No project item found for closed issue; nothing to update.");
              return;
            }

            const optionId = (action === "closed") ? doneOptionId : todoOptionId;
            const updateMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId,
                  itemId: $itemId,
                  fieldId: $fieldId,
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `;
            await github.graphql(updateMutation, {
              projectId,
              itemId: item.id,
              fieldId: statusFieldId,
              optionId
            });
            core.info(`Project item ${item.id} synced for action ${action}.`);
